    <script>
      (function() {
        // Completely override fbq to prevent duplicates
        let fbqInitialized = false;
        const originalFbq = window.fbq;
        
        window.fbq = function() {
          if (arguments[0] === 'init') {
            if (fbqInitialized) {
              console.warn('Meta Pixel already initialized, blocking duplicate');
              return;
            }
            fbqInitialized = true;
            console.log('Meta Pixel initializing for first time');
          }
          
          if (originalFbq) {
            return originalFbq.apply(this, arguments);
          }
          
          // Queue calls if fbq not ready
          (window.fbq.q = window.fbq.q || []).push(arguments);
        };
        
        // Initialize fbq properties
        window.fbq.q = window.fbq.q || [];
        window.fbq.callMethod = window.fbq.callMethod || function() {
          window.fbq.callMethod.apply(window.fbq, arguments);
        };
        window.fbq.queue = window.fbq.queue || [];
        window.fbq.loaded = window.fbq.loaded || false;
        window.fbq.version = window.fbq.version || '2.0';
        
        // Override console.error to suppress Meta Pixel duplicate errors and fetch errors
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const message = args.join(' ');
          if (message.includes('Duplicate Pixel ID') || 
              message.includes('937229285084127') ||
              message.includes('Fetch error from :') ||
              message.includes('Fetch error from undefined') ||
              message.includes('Fetch error from null') ||
              message.includes('Fetch error from about:blank') ||
              message.includes('Fetch error from chrome-extension:') ||
              message.includes('physiotherapy/:194')) {
            console.warn('Suppressed error:', message);
            return;
          }
          return originalConsoleError.apply(console, args);
        };
      })();
    </script>

    <script type="module">
const observer = new MutationObserver((mutations) => {
	for (const mutation of mutations) {
		for (const addedNode of mutation.addedNodes) {
			if (
				addedNode.nodeType === Node.ELEMENT_NODE &&
				(
					addedNode.tagName?.toLowerCase() === 'vite-error-overlay' ||
					addedNode.classList?.contains('backdrop')
				)
			) {
				handleViteOverlay(addedNode);
			}
		}
	}
});

observer.observe(document.documentElement, {
	childList: true,
	subtree: true
});

function handleViteOverlay(node) {
	if (!node.shadowRoot) {
		return;
	}

	const backdrop = node.shadowRoot.querySelector('.backdrop');

	if (backdrop) {
		const overlayHtml = backdrop.outerHTML;
		const parser = new DOMParser();
		const doc = parser.parseFromString(overlayHtml, 'text/html');
		const messageBodyElement = doc.querySelector('.message-body');
		const fileElement = doc.querySelector('.file');
		const messageText = messageBodyElement ? messageBodyElement.textContent.trim() : '';
		const fileText = fileElement ? fileElement.textContent.trim() : '';
		const error = messageText + (fileText ? ' File:' + fileText : '');

		window.parent.postMessage({
			type: 'horizons-vite-error',
			error,
		}, '*');
	}
}
</script>
    <script type="module">
const originalConsoleError = console.error;
console.error = function(...args) {
	originalConsoleError.apply(console, args);

	let errorString = '';

	for (let i = 0; i < args.length; i++) {
		const arg = args[i];
		if (arg instanceof Error) {
			errorString = arg.stack || `${arg.name}: ${arg.message}`;
			break;
		}
	}

	if (!errorString) {
		errorString = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
	}

	window.parent.postMessage({
		type: 'horizons-console-error',
		error: errorString
	}, '*');
};
</script>
    <script type="module">
const originalFetch = window.fetch;

window.fetch = function(...args) {
	const url = args[0] instanceof Request ? args[0].url : args[0];

	// Skip WebSocket URLs
	if (url.startsWith('ws:') || url.startsWith('wss:')) {
		return originalFetch.apply(this, args);
	}

	// Skip invalid URLs to prevent fetch errors
	if (!url || url.trim() === '' || url === 'undefined' || url === 'null' || url.length < 3) {
		// Silently handle invalid URLs without logging
		return Promise.reject(new Error('Invalid URL provided to fetch'));
	}

	return originalFetch.apply(this, args)
		.then(async response => {
			const contentType = response.headers.get('Content-Type') || '';

			// Exclude HTML document responses
			const isDocumentResponse =
				contentType.includes('text/html') ||
				contentType.includes('application/xhtml+xml');

			if (!response.ok && !isDocumentResponse) {
					const responseClone = response.clone();
					const errorFromRes = await responseClone.text();
					const requestUrl = response.url;
					// Completely suppress fetch error logging to prevent console spam
					// Only log critical errors that are not empty URL related
					if (requestUrl && 
						requestUrl.trim() !== '' && 
						requestUrl !== 'undefined' && 
						requestUrl !== 'null' &&
						!requestUrl.includes('data:') &&
						!requestUrl.includes('blob:') &&
						requestUrl.length > 5 &&
						!requestUrl.includes('about:blank') &&
						!requestUrl.includes('chrome-extension://')) {
						// Only log if it's a real error, not empty URL
						if (errorFromRes && errorFromRes.trim() !== '') {
							console.warn(`Fetch warning from ${requestUrl}: ${errorFromRes}`);
						}
					}
			}

			return response;
		})
		.catch(error => {
			// Only log errors for valid URLs to prevent spam
			if (url && url.trim() !== '' && url !== 'undefined' && url !== 'null' && !url.match(/.html?$/i)) {
				console.error(error);
			}

			throw error;
		});
};
</script>

    <!-- Enhanced conversion tracking -->
    <script>
      function gtag_report_conversion(url) {
        var callback = function () {
          if (typeof url !== 'undefined') {
            window.location = url;
          }
        };
        gtag('event', 'conversion', {
          send_to: 'AW-16614033926/29hRCIHVqasbEIaUmPI9',
          event_callback: callback,
        });
        return false;
      }

      // Enhanced conversion tracking for different actions
      function trackConversion(conversionType) {
        gtag('event', 'conversion', {
          send_to: 'AW-16614033926/29hRCIHVqasbEIaUmPI9',
          conversion_type: conversionType,
          gclid: localStorage.getItem('gclid')
        });
      }

      // Track form submissions
      function trackFormSubmission(formData) {
        gtag('event', 'form_submit', {
          event_category: 'form_submission',
          event_label: 'contact_form',
          gclid: localStorage.getItem('gclid'),
          form_data: formData
        });
        
        // Meta Pixel Lead event via GTM
        if (typeof dataLayer !== 'undefined') {
          dataLayer.push({
            event: 'fb_lead',
            content_name: 'Physiotherapy Contact Form',
            content_category: 'Healthcare',
            gclid: localStorage.getItem('gclid')
          });
        }
        
        trackConversion('form_submission');
      }

      // Track phone calls
      function trackPhoneCall(phoneNumber) {
        gtag('event', 'phone_call', {
          event_category: 'phone_call',
          event_label: phoneNumber,
          gclid: localStorage.getItem('gclid')
        });
        
        // Meta Pixel Contact event via GTM
        if (typeof dataLayer !== 'undefined') {
          dataLayer.push({
            event: 'fb_contact',
            content_name: 'Phone Call',
            content_category: 'Healthcare',
            gclid: localStorage.getItem('gclid')
          });
        }
        
        trackConversion('phone_call');
      }

      // Track WhatsApp clicks
      function trackWhatsAppClick(phoneNumber) {
        gtag('event', 'whatsapp_click', {
          event_category: 'whatsapp_click',
          event_label: phoneNumber,
          gclid: localStorage.getItem('gclid')
        });
        
        // Meta Pixel Contact event via GTM
        if (typeof dataLayer !== 'undefined') {
          dataLayer.push({
            event: 'fb_contact',
            content_name: 'WhatsApp Click',
            content_category: 'Healthcare',
            gclid: localStorage.getItem('gclid')
          });
        }
        
        trackConversion('whatsapp_click');
      }

      // Track button clicks
      function trackButtonClick(buttonName, buttonLocation) {
        gtag('event', 'button_click', {
          event_category: 'button_click',
          event_label: buttonName,
          button_location: buttonLocation,
          gclid: localStorage.getItem('gclid')
        });
      }

      // Track scroll depth
      let maxScroll = 0;
      const scrollThresholds = [25, 50, 75, 90, 100];
      const trackedThresholds = new Set();

      window.addEventListener('scroll', () => {
        const scrollPercent = Math.round(
          (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100
        );
        
        if (scrollPercent > maxScroll) {
          maxScroll = scrollPercent;
          
          scrollThresholds.forEach(threshold => {
            if (scrollPercent >= threshold && !trackedThresholds.has(threshold)) {
              trackedThresholds.add(threshold);
              
              gtag('event', 'scroll', {
                event_category: 'engagement',
                event_label: `${threshold}%`,
                value: threshold
              });
            }
          });
        }
      });

      // Track time on page
      const startTime = Date.now();
      window.addEventListener('beforeunload', () => {
        const timeOnPage = Math.round((Date.now() - startTime) / 1000);
        gtag('event', 'timing_complete', {
          name: 'time_on_page',
          value: timeOnPage
        });
      });

      // Make functions globally available
      window.trackConversion = trackConversion;
      window.trackFormSubmission = trackFormSubmission;
      window.trackPhoneCall = trackPhoneCall;
      window.trackWhatsAppClick = trackWhatsAppClick;
      window.trackButtonClick = trackButtonClick;
    </script>
